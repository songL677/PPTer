name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag, for example v0.1.0"
        required: false
        default: ""
      upload_release:
        description: "Upload PPTer-Setup.exe to the GitHub Release for release_tag"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build PPTer setup for Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build PyInstaller app
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          .\packaging\build_windows_app.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.release_tag }}" -ne "") {
            $tag = "${{ inputs.release_tag }}"
          }

          $version = $tag.TrimStart("v")
          if ($version -eq "" -or $version -eq "main") {
            $version = "0.1.0"
          }

          $env:PPTER_VERSION = $version
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "packaging\windows_installer.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPTer-Setup-Windows
          path: dist/installer/PPTer-Setup.exe
          if-no-files-found: error

      - name: Upload installer to GitHub Release
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && inputs.upload_release == 'true' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: PPTer ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: dist/installer/PPTer-Setup.exe
